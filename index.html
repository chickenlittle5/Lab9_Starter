<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({ 
      token: "7e3f1c03c5194630a6329b4ccad16c38"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    class CalculatorInputError extends Error {
      constructor(message, field) {
        super(message);
        this.name = 'CalculatorInputError';
        this.field = field;
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      // Start your code here
      // You may move this JS to another file if you wish

      try {
        let firstNumInput = document.querySelector('#first-num');
        let secondNumInput = document.querySelector('#second-num');
        let operatorInput = document.querySelector('#operator');

        if (!firstNumInput || !secondNumInput || !operatorInput) {
          throw new Error('The calculator form is missing one or more required controls.');
        }

        let firstNum = getValidNumber(firstNumInput, 'first number');
        let secondNum = getValidNumber(secondNumInput, 'second number');
        let operator = operatorInput.value;

        if (operator === '/' && secondNum === 0) {
          throw new CalculatorInputError('Cannot divide by zero.', 'second number');
        }

        output.textContent = calculate(firstNum, secondNum, operator);
      } catch (err) {
        output.textContent = err.message;
        console.error('Calculator error caught by try/catch:', err);
      } finally {
        console.log('Calculator submit handler finished.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    function getValidNumber(input, fieldName) {
      let trimmedValue = input.value.trim();

      if (trimmedValue === '') {
        throw new CalculatorInputError(`Please enter the ${fieldName}.`, fieldName);
      }

      let number = Number(trimmedValue);

      if (Number.isNaN(number)) {
        throw new CalculatorInputError(`The ${fieldName} must be a number.`, fieldName);
      }

      return number;
    }

    function calculate(firstNum, secondNum, operator) {
      switch (operator) {
        case '+':
          return firstNum + secondNum;
        case '-':
          return firstNum - secondNum;
        case '*':
          return firstNum * secondNum;
        case '/':
          return firstNum / secondNum;
        default:
          throw new CalculatorInputError(`Unsupported operator: ${operator}`, 'operator');
      }
    }

    function getDemoData() {
      return {
        course: 'CSE 110',
        lab: 9,
        topic: 'Error handling and console methods',
        sampleInputs: [4, 2],
        result: calculate(4, 2, '+')
      };
    }

    let existingGlobalErrorHandler = window.onerror;

    window.onerror = function (message, source, line, column, error) {
      console.log('Global error caught by window.onerror:', {
        message,
        source,
        line,
        column,
        error
      });

      if (typeof existingGlobalErrorHandler === 'function') {
        existingGlobalErrorHandler(message, source, line, column, error);
      }

      return false;
    };

    let demoActions = {
      'Console Log': () => console.log('Console log demo:', getDemoData()),
      'Console Error': () => console.error('Console error demo:', new Error('Example error message')),
      'Console Count': () => console.count('Console count demo'),
      'Console Warn': () => console.warn('Console warn demo: check your inputs before calculating.'),
      'Console Assert': () => console.assert(2 + 2 === 5, 'Console assert demo: this assertion intentionally failed.'),
      'Console Clear': () => console.clear(),
      'Console Dir': () => console.dir(document.querySelector('form')),
      'Console dirxml': () => console.dirxml(document.querySelector('main')),
      'Console Group Start': () => {
        console.group('Console group demo');
        console.log('First grouped message');
        console.log('Demo data:', getDemoData());
      },
      'Console Group End': () => {
        console.log('Ending the current console group.');
        console.groupEnd();
      },
      'Console Table': () => console.table([
        { operation: 'addition', firstNum: 4, secondNum: 2, result: calculate(4, 2, '+') },
        { operation: 'subtraction', firstNum: 4, secondNum: 2, result: calculate(4, 2, '-') },
        { operation: 'multiplication', firstNum: 4, secondNum: 2, result: calculate(4, 2, '*') },
        { operation: 'division', firstNum: 4, secondNum: 2, result: calculate(4, 2, '/') }
      ]),
      'Start Timer': () => console.time('Console timer demo'),
      'End Timer': () => console.timeEnd('Console timer demo'),
      'Console Trace': () => runTraceDemo(),
      'Trigger a Global Error': () => {
        setTimeout(() => {
          throw new Error('Global error demo triggered by button click.');
        }, 0);
      }
    };

    function runTraceDemo() {
      function firstStep() {
        secondStep();
      }

      function secondStep() {
        console.trace('Console trace demo');
      }

      firstStep();
    }

    errorBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        demoActions[btn.textContent]();
      });
    });
  </script>
</body>

</html>
